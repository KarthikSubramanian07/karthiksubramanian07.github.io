name: Update dev stats

on:
  schedule:
    - cron: "0 7 * * *"   # daily 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Persist the owner's PAT as the push credential so the daily data-only
          # commit can push to protected `main`. The default GITHUB_TOKEN
          # (github-actions[bot]) is rejected by the "Playwright Tests" required
          # check, which can't report on a direct bot push. Playwright still
          # gates real PRs via ci.yml.
          token: ${{ secrets.STATS_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Refresh dev-stats.json
        env:
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATS_USER: KarthikSubramanian07
        run: node scripts/update-stats.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dev-stats.json
          if git diff --staged --quiet; then echo "No changes."; else git commit -m "Update dev stats" && git push; fi
